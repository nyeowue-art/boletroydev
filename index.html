<!DOCTYPE html>
<html lang="tr">
<!-- Dark mode için 'dark' sınıfı buraya eklenecek -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boletroydev | Projeler & Gizlilik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">
    <!-- Navigasyon -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm dark:shadow-lg sticky top-0 z-50 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#" onclick="showView('home')"
                class="text-2xl font-bold text-blue-600 tracking-tight">boletroydev</a>
            <div class="flex items-center space-x-6">
                <button id="theme-toggle"
                    class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors duration-300">
                    ☀️
                </button>
                <button onclick="showView('home')"
                    class="hover:text-blue-600 font-medium transition">Uygulamalar</button>
                <button onclick="showView('privacy')"
                    class="hover:text-blue-600 font-medium transition">Gizlilik</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-12">

        <!-- EKRAN 1: Uygulama Listesi (Home) -->
        <section id="home" class="view active">
            <h1 class="text-4xl font-extrabold mb-8 text-gray-900 dark:text-gray-100">Uygulamalarım</h1>
            <div id="apps-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Veriler apps.json'dan gelecek -->
            </div>
        </section>

        <!-- EKRAN 2: Uygulama Detay Ekranı -->
        <section id="detail" class="view">
            <button onclick="showView('home')"
                class="mb-8 text-gray-500 hover:text-blue-600 flex items-center font-medium">
                <span class="mr-2">←</span> Uygulamalara Geri Dön
            </button>
            <div
                class="bg-white dark:bg-gray-800 rounded-3xl p-8 md:p-12 shadow-sm border border-gray-100 dark:border-gray-700">
                <div id="app-content">
                    <!-- İçerik JavaScript ile dolacak -->
                </div>
            </div>
        </section>

        <!-- EKRAN 3: Gizlilik Politikası -->
        <section id="privacy" class="view">
            <h1 class="text-4xl font-extrabold mb-8 text-gray-900 dark:text-gray-100">Gizlilik Politikası</h1>
            <div id="privacy-content" class="space-y-8 max-w-3xl">
                <!-- Dinamik olarak dolacak -->
            </div>
        </section>

    </main>

    <footer class="mt-20 py-10 border-t border-gray-100 text-center text-gray-400">
        <p>© 2024 <span class="font-bold text-gray-700 dark:text-gray-300">boletroydev</span> | Tüm Hakları Saklıdır.
        </p>
    </footer>

    <script>
        // Apps verisi - doğrudan HTML'e gömülü
        let apps = {
            "project-asistan": {
                "title": "Gymix – Fitness, Habit & Focus",
                "icon": "icons/gymix-logo.jpg",
                "desc": "İşlerinizi organize etmenize yardımcı olan profesyonel bir araç.",
                "features": [
                    "Kullanıcı Dostu Arayüz",
                    "Çevrimdışı Çalışma Desteği",
                    "Bulut Senkronizasyonu"
                ],
                "version": "1.0.7",
                "playStoreUrl": "https://play.google.com/store",
                "appStoreUrl": "https://www.apple.com/app-store/",
                "privacy": "Proje Asistanı, projelerinizi sadece cihazınızda saklar. Hiçbir kişisel veri reklam amaçlı kullanılmaz.",
                "badge": "Yeni"
            },
            "gorev-takipci": {
                "title": "Downgrade – Bacak Kası",
                "icon": "icons/downgrade-logo.png",
                "desc": "Günlük görevlerinizi kolayca yönetin ve üretkenliğinizi artırın.",
                "features": ["Basit Arayüz", "Hatırlatıcılar", "Kategori Oluşturma"],
                "version": "1.0.0",
                "playStoreUrl": "#",
                "appStoreUrl": "#",
                "privacy": "Görev Takipçi uygulaması, görevlerinizi ve hatırlatıcılarınızı yerel veritabanında tutar.",
                "badge": "Güncellendi"
            },
            "butce-yoneticisi": {
                "title": "Hizli Cüzdan – Bütçe Yöneticisi",
                "icon": "icons/fastwallet-logo.png",
                "desc": "Gelir ve giderlerinizi takip ederek finansal hedeflerinize ulaşın.",
                "features": ["Grafik Analizleri", "Excel Dışa Aktar", "Çoklu Para Birimi"],
                "version": "1.0.0",
                "playStoreUrl": "#",
                "appStoreUrl": "#",
                "privacy": "Bütçe Yöneticisi verilerinizi şifrelenmiş olarak saklar.",
                "badge": null
            }
        };

        function loadApps() {
            renderApps();
        }

        function renderApps() {
            const grid = document.getElementById('apps-grid');
            grid.innerHTML = Object.keys(apps).map(id => {
                const app = apps[id];
                const badgeColor = app.badge === 'Yeni' ? 'bg-blue-600' : 'bg-orange-600';
                return `
                <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden hover:shadow-xl transition-all duration-300 group relative animate-fadeIn">
                    ${app.badge ? `<span class="absolute top-4 right-4 ${badgeColor} text-white text-[10px] uppercase px-2 py-1 rounded-lg font-black tracking-wider shadow-sm z-10">${app.badge}</span>` : ''}
                    <div class="h-48 bg-gray-50 dark:bg-gray-700/50 flex items-center justify-center p-8">
                        <img src="${app.icon}" alt="${app.title}" class="w-24 h-24 rounded-2xl shadow-lg group-hover:scale-110 transition-transform duration-300">
                    </div>
                    <div class="p-6">
                        <h2 class="text-2xl font-bold mb-2">${app.title}</h2>
                        <p class="text-gray-600 dark:text-gray-400 mb-6 text-sm line-clamp-2">${app.desc}</p>
                        <button onclick="showAppDetail('${id}')" class="w-full bg-gray-900 dark:bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition">Detayları Gör</button>
                    </div>
                </div>`;
            }).join('');
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if (viewId === 'privacy') renderPrivacy();
            window.scrollTo(0, 0);
        }

        function showAppDetail(appId) {
            const app = apps[appId];
            const content = document.getElementById('app-content');
            content.innerHTML = `
                <div class="flex flex-col md:flex-row gap-10 items-start animate-fadeIn">
                    <div class="w-32 h-32 shrink-0">
                        <img src="${app.icon}" class="w-full h-full rounded-3xl shadow-xl object-cover border-4 border-white dark:border-gray-700">
                    </div>
                    <div class="flex-1">
                        <h2 class="text-4xl font-black mb-4">${app.title}</h2>
                        <p class="text-xl text-gray-600 mb-8 leading-relaxed">${app.desc}</p>
                        <h4 class="text-lg font-bold mb-4 text-gray-900 dark:text-gray-100">Öne Çıkan Özellikler</h4>
                        <ul class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-8 text-gray-700 dark:text-gray-200">
                            ${app.features.map(f => `<li class="flex items-center"><span class="text-green-500 mr-2">✓</span> ${f}</li>`).join('')}
                        </ul>
                        
                        <div class="flex flex-wrap gap-4 mb-8">
                            ${app.playStoreUrl && app.playStoreUrl !== '#' ? `<a href="${app.playStoreUrl}" target="_blank" class="bg-black text-white px-6 py-3 rounded-xl font-bold flex items-center hover:scale-105 transition-transform"><span class="mr-2 text-xl">▶</span> Google Play</a>` : ''}
                            ${app.appStoreUrl && app.appStoreUrl !== '#' ? `<a href="${app.appStoreUrl}" target="_blank" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold flex items-center hover:scale-105 transition-transform"><span class="mr-2 text-xl">🍎</span> App Store</a>` : ''}
                            <button onclick="showPrivacy('${appId}')" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-xl font-bold flex items-center transition-transform hover:scale-105"><span class="mr-2 text-xl">📋</span> Gizlilik Politikası</button>
                        </div>

                        <div class="text-sm text-gray-400 dark:text-gray-500 font-mono">Versiyon: ${app.version}</div>
                    </div>
                </div>`;
            showView('detail');
        }

        function renderPrivacy() {
            const privacyContent = document.getElementById('privacy-content');
            privacyContent.innerHTML = Object.values(apps).map(app => `
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 shadow-sm border border-gray-100 dark:border-gray-700">
                    <div class="flex items-center gap-4 mb-4">
                        <img src="${app.icon}" class="w-10 h-10 rounded-lg">
                        <h3 class="text-xl font-bold">${app.title} - Gizlilik</h3>
                    </div>
                    <p class="text-gray-600 dark:text-gray-300 leading-relaxed">${app.privacy}</p>
                </div>
            `).join('');
        }

        function showPrivacy(appId) {
            const app = apps[appId];
            const privacyContent = document.getElementById('privacy-content');
            privacyContent.innerHTML = `
                <button onclick="window.location.hash='#home'" class="mb-8 text-gray-500 hover:text-blue-600 flex items-center font-medium">
                    <span class="mr-2">←</span> Uygulamaya Geri Dön
                </button>
                <div class="bg-white dark:bg-gray-800 rounded-3xl p-8 md:p-12 shadow-sm border border-gray-100 dark:border-gray-700 animate-fadeIn">
                    <div class="flex items-start gap-6 mb-8">
                        <img src="${app.icon}" class="w-24 h-24 rounded-3xl shadow-xl flex-shrink-0">
                        <div class="flex-1">
                            <h1 class="text-4xl font-black mb-2">${app.title}</h1>
                            <p class="text-blue-600 dark:text-blue-400 font-semibold text-lg">Gizlilik Politikası</p>
                            <p class="text-gray-500 text-sm mt-2">Son Güncelleme: ${new Date().toLocaleDateString('tr-TR')}</p>
                        </div>
                        <button onclick="copyPrivacyUrl('${appId}')" class="mt-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition whitespace-nowrap">
                            🔗 URL Kopyala
                        </button>
                    </div>
                    
                    <div class="border-t-2 border-gray-200 dark:border-gray-700 pt-8 space-y-6">
                        <div>
                            <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-3">📋 Gizlilik Politikası</h3>
                            <p class="text-gray-600 dark:text-gray-300 leading-relaxed text-base whitespace-pre-wrap">${app.privacy}</p>
                        </div>
                        
                        <div class="bg-blue-50 dark:bg-blue-900/30 rounded-xl p-6 border border-blue-200 dark:border-blue-800">
                            <h3 class="text-lg font-bold text-blue-900 dark:text-blue-300 mb-2">❓ Google Play İçin</h3>
                            <p class="text-blue-800 dark:text-blue-200 text-sm mb-3">Aşağıdaki URL'yi Google Play Console'da "Privacy Policy" bölümüne yapıştırın:</p>
                            <div class="bg-white dark:bg-gray-900 p-3 rounded-lg border border-blue-300 dark:border-blue-700 font-mono text-sm text-gray-700 dark:text-gray-300 break-all">
                                ${window.location.origin}${window.location.pathname}#privacy/${appId}
                            </div>
                            <button onclick="copyGooglePlayUrl('${appId}')" class="mt-3 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition w-full">
                                📋 Google Play URL'sini Kopyala
                            </button>
                        </div>
                    </div>
                </div>
            `;
            showView('privacy');
            window.location.hash = `#privacy/${appId}`;
        }

        function copyPrivacyUrl(appId) {
            const url = `${window.location.origin}${window.location.pathname}#privacy/${appId}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL kopyalandı! 📋');
            });
        }

        function copyGooglePlayUrl(appId) {
            const url = `${window.location.origin}${window.location.pathname}#privacy/${appId}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('Google Play URL\'si kopyalandı! 🎉');
            });
        }

        // Dark mode JavaScript
        const themeToggle = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement; // <html> etiketini hedef alıyoruz

        // Sayfa yüklendiğinde temayı kontrol et
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                htmlElement.classList.add('dark');
                themeToggle.innerHTML = '🌙'; // Ay ikonu
            } else {
                htmlElement.classList.remove('dark');
                themeToggle.innerHTML = '☀️'; // Güneş ikonu
            }
        }

        // Tema değiştirme fonksiyonu
        themeToggle.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            const currentTheme = htmlElement.classList.contains('dark') ? 'dark' : 'light';
            localStorage.setItem('theme', currentTheme);
            themeToggle.innerHTML = currentTheme === 'dark' ? '🌙' : '☀️';
        });

        // Sayfa yüklendiğinde temayı başlat
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadApps();

            // URL'den app parametresini kontrol et
            const hash = window.location.hash;
            if (hash.startsWith('#privacy/')) {
                const appId = hash.replace('#privacy/', '');
                setTimeout(() => {
                    if (apps[appId]) {
                        showPrivacy(appId);
                    }
                }, 100);
            }
        });

        // Hash değişikliklerini dinle
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash;
            if (hash.startsWith('#privacy/')) {
                const appId = hash.replace('#privacy/', '');
                if (apps[appId]) {
                    showPrivacy(appId);
                }
            } else if (hash === '#home') {
                showView('home');
            }
        });
    </script>
</body>

</html>
